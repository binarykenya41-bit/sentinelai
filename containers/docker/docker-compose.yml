version: "3.9"

# ─── Sentinel AI — Local Development Stack ────────────────────────────────────
# Usage:
#   cd containers/docker
#   docker compose up -d
#
# Services: frontend, backend, postgres, redis, neo4j
# Sandbox network is created separately by the simulation engine.

networks:
  sentinel-internal:
    driver: bridge
  sentinel-sandbox:
    driver: bridge
    internal: true   # No external routing — sandbox isolation (exploit tool containers)
  sentinel-company:
    driver: bridge   # Company-infra targets — port bindings accessible from host

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  suricata-logs:
  ntopng-data:
  dvwa-data:
  webgoat-data:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  erpnext-bench:   # persists bench/sites across container restarts

services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../
      dockerfile: containers/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file: ../../.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - sentinel-internal
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: containers/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: ../../.env
    environment:
      - REDIS_URL=redis://redis:6379
      - SANDBOX_NETWORK=sentinel-sandbox
    volumes:
      # Mount Docker socket so backend can manage sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sentinel-internal
    depends_on:
      - redis
    restart: unless-stopped

  # ── PostgreSQL (local dev only — use Supabase in production) ──────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-sentineldev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    networks:
      - sentinel-internal
    restart: unless-stopped

  # ── Redis (CVE / session / graph cache) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - sentinel-internal
    restart: unless-stopped

  # ── Neo4j (attack graph topology) ─────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sentineldev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports:
      - "7687:7687"   # Bolt
      - "7474:7474"   # HTTP Browser
    networks:
      - sentinel-internal
    restart: unless-stopped

  # ── Scanner (run on demand — not always-on) ───────────────────────────────
  scanner:
    build:
      context: ../../
      dockerfile: containers/docker/Dockerfile.scanner
    profiles:
      - scanner  # docker compose --profile scanner run scanner trivy image ...
    networks:
      - sentinel-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: "no"

  # ── Network Monitoring: Suricata (IDS/IPS) ────────────────────────────────
  suricata:
    image: jasonish/suricata:latest
    profiles:
      - network-monitoring
    network_mode: host          # needs host networking to capture traffic
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    command: -i eth0 --init-errors-fatal -v
    volumes:
      - suricata-logs:/var/log/suricata
      - ./suricata.yaml:/etc/suricata/suricata.yaml:ro
    restart: unless-stopped

  # ── Network Monitoring: ntopng (traffic analysis) ─────────────────────────
  ntopng:
    image: ntop/ntopng:stable
    profiles:
      - network-monitoring
    network_mode: host
    cap_add:
      - NET_ADMIN
    command: --interface=eth0 --http-port=3001 --community
    volumes:
      - ntopng-data:/var/lib/ntopng
    restart: unless-stopped

  # ── Infrastructure Monitoring: Zabbix Server ──────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    profiles:
      - network-monitoring
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-sentineldev}
      POSTGRES_DB: zabbix
    depends_on:
      - postgres
    ports:
      - "10051:10051"
    networks:
      - sentinel-internal
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
    profiles:
      - network-monitoring
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-sentineldev}
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: UTC
    depends_on:
      - zabbix-server
    ports:
      - "8080:8080"
    networks:
      - sentinel-internal
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # VULNERABLE TARGETS  (profile: vuln-targets)
  # Intentionally vulnerable apps for exploit simulation testing.
  # Start with: docker compose --profile vuln-targets up -d
  # These are isolated on sentinel-sandbox — no external internet access.
  # ────────────────────────────────────────────────────────────────────────────

  # DVWA — Damn Vulnerable Web Application (SQLi, XSS, CSRF, File Upload, Brute Force)
  # CVEs tested: generic SQLi / XSS / auth bypass patterns
  # Source: https://github.com/digininja/DVWA
  dvwa:
    image: vulnerables/web-dvwa:latest
    profiles:
      - vuln-targets
    environment:
      - RECAPTCHA_PRIV_KEY=
      - RECAPTCHA_PUB_KEY=
    ports:
      - "8100:80"
    volumes:
      - dvwa-data:/var/lib/mysql
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-dvwa

  # OWASP Juice Shop — modern vulnerable Node.js app (XSS, SQLi, IDOR, SSRF, JWT)
  # CVEs tested: injection, broken auth, insecure deserialization
  # Source: https://github.com/juice-shop/juice-shop
  juice-shop:
    image: bkimminich/juice-shop:latest
    profiles:
      - vuln-targets
    ports:
      - "8101:3000"
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-juice-shop

  # WebGoat — OWASP Java training app (SQLi, XSS, XXE, IDOR, Deserialization)
  # Source: https://github.com/WebGoat/WebGoat
  webgoat:
    image: webgoat/webgoat:latest
    profiles:
      - vuln-targets
    ports:
      - "8102:8080"
      - "9090:9090"
    volumes:
      - webgoat-data:/home/webgoat/.webgoat
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-webgoat

  # Log4Shell vulnerable app — CVE-2021-44228 (CVSS 10.0)
  # Apache Log4j 2.14.1 with JNDI injection via HTTP headers
  # Source: https://github.com/christophetd/log4shell-vulnerable-app
  log4shell-target:
    image: ghcr.io/christophetd/log4shell-vulnerable-app:latest
    profiles:
      - vuln-targets
    ports:
      - "8103:8080"
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-log4shell

  # Spring4Shell vulnerable app — CVE-2022-22965 (CVSS 9.8)
  # Spring Framework RCE via data binding
  # Source: https://github.com/reznok/Spring4Shell-POC
  spring4shell-target:
    image: vulfocus/spring-core-rce-2022-03-29:latest
    profiles:
      - vuln-targets
    ports:
      - "8104:8080"
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-spring4shell

  # Metasploitable2 — classic vulnerable Linux (FTP, SSH, HTTP, SMB, MySQL)
  # CVEs: CVE-2004-2687 (distcc), CVE-2010-1938 (ProFTPd), many more
  # Source: https://github.com/rapid7/metasploitable3 (community image)
  metasploitable:
    image: tleemcjr/metasploitable2:latest
    profiles:
      - vuln-targets
    ports:
      - "8105:80"   # HTTP (Mutillidae, DVWA, phpMyAdmin)
      - "2121:21"   # FTP
      - "2222:22"   # SSH
      - "3306:3306" # MySQL (no auth)
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-metasploitable

  # bWAPP — buggy web app (700+ vulnerabilities, all OWASP categories)
  # Source: http://www.itsecgames.com/
  bwapp:
    image: raesene/bwapp:latest
    profiles:
      - vuln-targets
    ports:
      - "8106:80"
    networks:
      - sentinel-sandbox
    restart: unless-stopped
    container_name: sentinel-bwapp

  # ────────────────────────────────────────────────────────────────────────────
  # COMPANY INFRASTRUCTURE CLONES  (profile: company-infra)
  # Vulnerable versions of the actual company stack for exploit simulation.
  # Maps to the Sentinel infra-scan service catalog.
  # Start with: docker compose --profile company-infra up -d
  # All services are isolated on sentinel-sandbox network.
  #
  # IMPORTANT: These are intentionally vulnerable. Do NOT expose externally.
  # ────────────────────────────────────────────────────────────────────────────

  # ── GitLab CE 16.0.0 — CVE-2023-7028 (CVSS 10.0, KEV) ─────────────────────
  # Account takeover via password reset email hijacking — no auth required
  # Exploit: exploit-files/tools/gitlab/cve_2023_7028.py
  # Admin UI: http://localhost:8200 (initial password in /etc/gitlab/initial_root_password)
  gitlab-vuln:
    image: gitlab/gitlab-ce:16.0.0-ce.0
    profiles:
      - company-infra
    hostname: gitlab.company.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8200'
        gitlab_rails['initial_root_password'] = 'SentinelDemo123!'
        gitlab_rails['smtp_enable'] = false
        nginx['listen_port'] = 80
    ports:
      - "8200:80"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    networks:
      - sentinel-company
    shm_size: "256m"
    restart: unless-stopped
    container_name: sentinel-gitlab

  # ── WordPress 6.1.0 — CVE-2024-6386 WPML SSTI, CVE-2024-4439 XSS ──────────
  # WPML plugin SSTI (CVSS 9.9) + Core XSS via Avatar block (CVSS 7.2)
  # Exploit: exploit-files/tools/wordpress/wp_enum.py + wp_ssti.py
  # Admin UI: http://localhost:8201/wp-admin (admin / SentinelDemo123!)
  wordpress-vuln:
    image: wordpress:6.1.0-php8.1-apache
    profiles:
      - company-infra
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('FORCE_SSL_ADMIN', false);
    ports:
      - "8201:80"
    depends_on:
      - wordpress-db
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-wordpress

  wordpress-db:
    image: mysql:8.0
    profiles:
      - company-infra
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-wordpress-db

  # ── ERPNext / Frappe — CVE-2024-25136 SQLi, CVE-2023-46127 Stored XSS ──────
  # Frappe SQL injection in report builder (CVSS 9.1) — full DB dump possible
  # Exploit: exploit-files/tools/erpnext/cve_2024_25136.py
  #
  # ERPNext requires MariaDB + Redis. We run it as a standalone mock that
  # exposes the vulnerable Frappe API surface for exploit simulation.
  # Admin: http://localhost:8202  (admin / admin)
  #
  # !! Full ERPNext stack setup: https://github.com/frappe/frappe_docker
  # For the demo we use bitnami/erpnext which bundles its dependencies.
  erpnext-db:
    image: mariadb:10.6
    profiles:
      - company-infra
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erpnext
      MYSQL_USER: frappe
      MYSQL_PASSWORD: frappe
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-erpnext-db

  erpnext-redis:
    image: redis:6-alpine
    profiles:
      - company-infra
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-erpnext-redis

  erpnext-vuln:
    image: frappe/erpnext:v15.0.0
    profiles:
      - company-infra
    depends_on:
      - erpnext-db
      - erpnext-redis
    # sentinel_app.py forces site=erp.company.local regardless of Host header
    # so http://localhost:8202 and the Codespaces URL both work in the browser.
    # host_name in site_config.json controls absolute URLs (links, redirects).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        printf 'import frappe.app as _a\n_a._site="erp.company.local"\n_a._sites_path="."\napplication=_a.application\n' \
          > /home/frappe/frappe-bench/sites/sentinel_app.py
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          --threads=4 --workers=2 --worker-class=gthread \
          --worker-tmp-dir=/dev/shm --timeout=120 --preload \
          sentinel_app:application
    environment:
      DB_HOST: erpnext-db
      DB_PORT: "3306"
      REDIS_CACHE: erpnext-redis:6379
      REDIS_QUEUE: erpnext-redis:6379
      REDIS_SOCKETIO: erpnext-redis:6379
    volumes:
      - erpnext-bench:/home/frappe/frappe-bench/sites  # persist site data
    ports:
      - "8202:8000"
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-erpnext

  # ── Keycloak 23.0.0 — CVE-2024-1132 path traversal, CVE-2023-6927 open redirect ──
  # Path traversal via redirect_uri bypass in OAuth2 flow (CVSS 8.1)
  # Exploit: exploit-files/tools/keycloak/cve_2024_1132.py
  # Admin UI: http://localhost:8203/admin (admin / SentinelDemo123!)
  keycloak-vuln:
    image: quay.io/keycloak/keycloak:23.0.0
    profiles:
      - company-infra
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: SentinelDemo123!
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8203:8080"
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-keycloak

  # ── PostgreSQL 15.0 — CVE-2024-0985 privilege escalation ───────────────────
  # Superuser privesc via ALTER TABLE crafted SQL (CVSS 8.0)
  # Exploit: exploit-files/tools/postgresql/pg_auth_check.py
  # Connection: localhost:8204 user=postgres pass=postgres
  postgres-vuln:
    image: postgres:15.0-alpine
    profiles:
      - company-infra
    environment:
      POSTGRES_DB: company_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres       # weak default for demo
      POSTGRES_HOST_AUTH_METHOD: trust  # trust auth — no password required from sandbox
    ports:
      - "8204:5432"
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-postgres-vuln

  # ── Grafana 8.3.0 — CVE-2021-43798 path traversal (CVSS 7.5, KEV) ─────────
  # Unauthenticated arbitrary file read via plugin directory traversal
  # Exploit: exploit-files/tools/grafana/cve_2021_43798.py
  # UI: http://localhost:8205 (admin / admin — default, not changed)
  grafana-vuln:
    image: grafana/grafana:8.3.0
    profiles:
      - company-infra
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin      # default — not rotated
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
    ports:
      - "8205:3000"
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-grafana-vuln

  # ── Prometheus 2.5.0 — CVE-2019-3826 stored XSS ────────────────────────────
  # Prometheus web UI with no auth (metrics exposure) + stored XSS in alert labels
  # Exploit: exploit-files/tools/prometheus/cve_2019_3826.py
  # UI: http://localhost:8206
  prometheus-vuln:
    image: prom/prometheus:v2.5.0
    profiles:
      - company-infra
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "8206:9090"
    networks:
      - sentinel-company
    restart: unless-stopped
    container_name: sentinel-prometheus-vuln

  # ── Netdata — Infrastructure Monitoring (Zabbix alternative) ────────────────
  # Replaces Zabbix: no NET_ADMIN needed, Prometheus-compatible metrics endpoint,
  # pre-built Grafana dashboards, monitors processes + Docker containers + host.
  # UI: http://localhost:8207  Metrics: http://localhost:8207/api/v1/allmetrics?format=prometheus
  netdata:
    image: netdata/netdata:stable
    profiles:
      - network-monitoring
    hostname: sentinel-netdata
    cap_add:
      - SYS_PTRACE          # needed to read /proc/<pid>/ of other processes
    security_opt:
      - apparmor:unconfined
    environment:
      - NETDATA_CLAIM_TOKEN=  # leave blank for local-only mode
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8207:19999"
    networks:
      - sentinel-internal
    restart: unless-stopped
    container_name: sentinel-netdata
