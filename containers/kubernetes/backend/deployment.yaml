apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-backend
  namespace: sentinelai
  labels:
    app: sentinel-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-backend
  template:
    metadata:
      labels:
        app: sentinel-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/your-org/sentinelai/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: "production"
            - name: BACKEND_PORT
              value: "8000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: ANTHROPIC_API_KEY
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: REDIS_URL
            - name: NVD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: NVD_API_KEY
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
