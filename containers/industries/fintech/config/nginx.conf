events {
  worker_connections 1024;
}

http {
  upstream payment_backend {
    server payment-gateway-api:3000;
  }

  upstream fraud_backend {
    server fraud-detection-svc:5000;
  }

  upstream kyc_backend {
    server kyc-verification-api:3000;
  }

  server {
    listen 80;
    server_name _;

    location /health {
      return 200 '{"status":"ok","service":"nginx-lb"}';
      add_header Content-Type application/json;
    }

    location /api/v1/payment/ {
      proxy_pass http://payment_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/fraud/ {
      proxy_pass http://fraud_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/kyc/ {
      proxy_pass http://kyc_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Intentionally expose metrics without auth (demo vulnerability)
    location /metrics {
      return 200 '# HELP nexapay_transactions_total Total transactions\n# TYPE nexapay_transactions_total counter\nnexapay_transactions_total 1842930\n';
      add_header Content-Type text/plain;
    }
  }
}
