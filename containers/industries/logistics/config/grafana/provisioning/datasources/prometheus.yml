# ─── Grafana datasource provisioning ────────────────────────────────────────
# Official: https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus-logistics
    type: grafana-prometheus-datasource
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
