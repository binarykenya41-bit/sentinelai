# ─── Prometheus Configuration — Logistics Stack ──────────────────────────────
# Scrapes: self, Grafana, Kafka (kafka-exporter), PostgreSQL (postgres-exporter),
#          Redis (redis-exporter)
# Official reference: https://prometheus.io/docs/prometheus/latest/configuration/configuration/
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    industry: logistics
    environment: demo

scrape_configs:
  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Grafana self-monitoring ────────────────────────────────────────────────
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics

  # ── Kafka exporter (danielqsj/kafka-exporter → :9308) ─────────────────────
  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # ── PostgreSQL shipment DB (prometheuscommunity/postgres-exporter → :9187) ─
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ── Redis tracking cache (oliver006/redis_exporter → :9121) ───────────────
  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
