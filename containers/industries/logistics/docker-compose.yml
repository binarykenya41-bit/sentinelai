# ─────────────────────────────────────────────────────────────────────────────
# Sentinel AI — Logistics / Supply Chain Industry Stack
# ─────────────────────────────────────────────────────────────────────────────
#
# Fully interlinked logistics platform (local auth, no SSO):
#   • Prometheus   → scrapes Grafana, Kafka, Postgres, Redis
#   • Grafana      → Prometheus + PostgreSQL datasources, 5 pre-built dashboards
#   • Kafka        → topics created on boot, seeded with shipment events
#   • PostgreSQL   → schema + 15 shipments / 26 tracking events seeded at init
#   • ERPNext      → customers, suppliers, items seeded via bench Python
#   • Redis        → active tracking cache pre-populated
#
# Cross-service data links:
#   • PostgreSQL customers.erpnext_id    → ERPNext Customer names
#   • PostgreSQL shipments.erpnext_delivery_note → ERPNext Delivery Notes
#   • Kafka erpnext-order topic          → mirrors ERPNext Sales Orders
#   • Redis shipment:* keys              → mirror shipment rows in PostgreSQL
#   • Grafana datasources                → PostgreSQL (logistics dashboards) + Prometheus
#
# Sources:
#   ERPNext    → https://github.com/frappe/frappe_docker
#   GitLab     → https://docs.gitlab.com/ee/install/docker/
#   Kafka      → https://hub.docker.com/r/apache/kafka
#   Postgres   → https://hub.docker.com/_/postgres
#   Redis      → https://hub.docker.com/_/redis
#   Prometheus → https://prometheus.io/docs/prometheus/latest/installation/
#   Grafana    → https://grafana.com/docs/grafana/latest/setup-grafana/installation/docker/
#
# Port map (logistics range: 9000–9299):
#   9000  ERPNext web UI             (http://localhost:9000)   admin / admin
#   9001  ERPNext websocket
#   9022  GitLab SSH
#   9080  GitLab HTTP                (http://localhost:9080)   root / SentinelLogistics!
#   9092  Kafka broker               (localhost:9092)
#   9100  Grafana                    (http://localhost:9100)   admin / admin
#   9191  Prometheus                 (http://localhost:9191)
#   9379  Redis tracking cache       (localhost:9379)
#   9432  PostgreSQL shipment DB     (localhost:9432)          logistics / logistics_pass
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  logistics-net:
    driver: bridge
    name: sentinel-logistics

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  # ERPNext (frappe_docker pattern)
  erpnext-sites:
  erpnext-logs:
  # ERPNext database (MariaDB — required by Frappe framework)
  mariadb-data:
  # Redis instances required by Frappe
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  # Logistics shipment DB (PostgreSQL)
  pg-shipment-data:
  # GitLab
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  # Monitoring
  prometheus-data:
  grafana-data:
  # Kafka
  kafka-data:

services:

  # ════════════════════════════════════════════════════════════════════════════
  # ERPNext — Supply chain & operations management
  # ════════════════════════════════════════════════════════════════════════════

  mariadb:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-erpnext_root}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    container_name: logistics-mariadb

  redis-cache:
    image: redis:alpine
    volumes:
      - redis-cache-data:/data
    networks:
      - logistics-net
    restart: unless-stopped
    container_name: logistics-redis-cache

  redis-queue:
    image: redis:alpine
    volumes:
      - redis-queue-data:/data
    networks:
      - logistics-net
    restart: unless-stopped
    container_name: logistics-redis-queue

  redis-socketio:
    image: redis:alpine
    volumes:
      - redis-socketio-data:/data
    networks:
      - logistics-net
    restart: unless-stopped
    container_name: logistics-redis-socketio

  # One-shot: configure bench globals
  erpnext-configurator:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    deploy:
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - |
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
    networks:
      - logistics-net
    depends_on:
      mariadb:
        condition: service_healthy

  # One-shot: create the ERPNext site
  erpnext-create-site:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    deploy:
      restart_policy:
        condition: none
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    entrypoint: ["bash", "-c"]
    command:
      - |
        wait-for-it -t 120 mariadb:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        wait-for-it -t 120 redis-socketio:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | python -c "import sys; import json; config = json.load(sys.stdin); print(config.get('db_host', config.get('db_port', '')))"` ]];
        do
          echo "Waiting for common_site_config.json...";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "Timed out waiting for common_site_config.json"; exit 1;
          fi;
        done;
        bench new-site logistics.local \
          --mariadb-root-password=${MYSQL_ROOT_PASSWORD:-erpnext_root} \
          --admin-password=${ERPNEXT_ADMIN_PASSWORD:-admin} \
          --install-app erpnext \
          --set-default;
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
    networks:
      - logistics-net
    depends_on:
      - erpnext-configurator
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio

  erpnext-backend:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    networks:
      - logistics-net
    depends_on:
      - erpnext-create-site
    restart: unless-stopped
    container_name: logistics-erpnext-backend

  erpnext-frontend:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    command: nginx-entrypoint.sh
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO: erpnext-websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
      FRAPPE_SITE_NAME_HEADER: logistics.local
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
    ports:
      - "9000:8080"
    networks:
      - logistics-net
    depends_on:
      - erpnext-backend
      - erpnext-websocket
    restart: unless-stopped
    container_name: logistics-erpnext

  erpnext-websocket:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
    ports:
      - "9001:9000"
    networks:
      - logistics-net
    depends_on:
      - erpnext-backend
    restart: unless-stopped
    container_name: logistics-erpnext-ws

  erpnext-scheduler:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    command: bench schedule
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    networks:
      - logistics-net
    depends_on:
      - erpnext-backend
    restart: unless-stopped
    container_name: logistics-erpnext-scheduler

  erpnext-queue-short:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    command: bench worker --queue short,default
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    networks:
      - logistics-net
    depends_on:
      - erpnext-backend
    restart: unless-stopped
    container_name: logistics-erpnext-queue-short

  erpnext-queue-long:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    command: bench worker --queue long,default,short
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    networks:
      - logistics-net
    depends_on:
      - erpnext-backend
    restart: unless-stopped
    container_name: logistics-erpnext-queue-long

  # ── One-shot: seed ERPNext with master data ───────────────────────────────
  # Seeds: customers, suppliers, items, item group, Social Login Key (Keycloak)
  erpnext-seed:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15.51.2}
    deploy:
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - |
        export HOME=/home/frappe
        cd /home/frappe/frappe-bench
        echo "=== ERPNext Seeder — waiting for site ==="
        until bench --site logistics.local list-apps 2>/dev/null | grep -q erpnext; do
          echo "  waiting for logistics.local ERPNext site..."; sleep 20
        done
        echo "  Site ready — running seed"
        /home/frappe/frappe-bench/env/bin/python /home/frappe/seed/03-erpnext-seed.py
        echo "=== ERPNext seed done ==="
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
      - ./config/seed:/home/frappe/seed:ro
    networks:
      - logistics-net
    depends_on:
      - erpnext-backend
    container_name: logistics-erpnext-seed

  # ════════════════════════════════════════════════════════════════════════════
  # PostgreSQL — Shipment tracking database
  # Init SQL seeds schema + sample shipments on first boot.
  # ════════════════════════════════════════════════════════════════════════════
  postgres-shipment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shipments
      POSTGRES_USER: ${PG_USER:-logistics}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-logistics_pass}
    volumes:
      - pg-shipment-data:/var/lib/postgresql/data
      # Init script runs automatically on first container start
      - ./config/seed/01-shipment-db.sql:/docker-entrypoint-initdb.d/01-shipment-db.sql:ro
    ports:
      - "9432:5432"
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-logistics} -d shipments"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    container_name: logistics-postgres

  # ── PostgreSQL metrics exporter (for Prometheus) ──────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${PG_USER:-logistics}:${PG_PASSWORD:-logistics_pass}@postgres-shipment:5432/shipments?sslmode=disable"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    networks:
      - logistics-net
    depends_on:
      postgres-shipment:
        condition: service_healthy
    restart: unless-stopped
    container_name: logistics-postgres-exporter

  # ════════════════════════════════════════════════════════════════════════════
  # Redis — Real-time tracking cache
  # redis-seed one-shot populates active shipment locations on first boot.
  # ════════════════════════════════════════════════════════════════════════════
  redis-tracking:
    image: redis:7-alpine
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "9379:6379"
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    container_name: logistics-redis

  # ── Redis metrics exporter (for Prometheus) ───────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: "redis://redis-tracking:6379"
    networks:
      - logistics-net
    depends_on:
      redis-tracking:
        condition: service_healthy
    restart: unless-stopped
    container_name: logistics-redis-exporter

  # ── One-shot: pre-populate Redis tracking cache ───────────────────────────
  redis-seed:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: none
    entrypoint: ["sh", "-c"]
    command:
      - |
        until redis-cli -h redis-tracking ping 2>/dev/null | grep -q PONG; do
          echo "Waiting for redis-tracking..."; sleep 3
        done
        sh /seed/04-redis-seed.sh
        echo "=== Redis seed done ==="
    volumes:
      - ./config/seed:/seed:ro
    networks:
      - logistics-net
    depends_on:
      redis-tracking:
        condition: service_healthy
    container_name: logistics-redis-seed

  # ════════════════════════════════════════════════════════════════════════════
  # Apache Kafka — Event streaming (KRaft mode, no ZooKeeper)
  # ════════════════════════════════════════════════════════════════════════════
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    container_name: logistics-kafka

  # ── One-shot: create Kafka topics + seed messages ─────────────────────────
  kafka-init:
    image: apache/kafka:latest
    deploy:
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - |
        until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1; do
          echo "Waiting for Kafka broker..."; sleep 5
        done
        echo "=== Creating Kafka topics ==="
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic shipment-created   --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic shipment-updated   --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic delivery-confirmed --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic tracking-event     --partitions 6 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic erpnext-order      --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic alert-triggered    --partitions 1 --replication-factor 1
        echo "=== Seeding sample messages ==="
        bash /seed/02-kafka-init.sh
        echo "=== Kafka init done ==="
    volumes:
      - ./config/seed:/seed:ro
    networks:
      - logistics-net
    depends_on:
      kafka:
        condition: service_healthy
    container_name: logistics-kafka-init

  # ── Kafka metrics exporter (for Prometheus) ───────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    command:
      - "--kafka.server=kafka:9092"
      - "--log.level=warn"
    networks:
      - logistics-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    container_name: logistics-kafka-exporter

  # ════════════════════════════════════════════════════════════════════════════
  # GitLab CE — Source control & CI/CD
  # Local auth only: root / SentinelLogistics!
  # ════════════════════════════════════════════════════════════════════════════
  gitlab:
    image: gitlab/gitlab-ce:latest
    hostname: gitlab.logistics.local
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:9080'
        gitlab_rails['gitlab_shell_ssh_port'] = 9022
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD:-SentinelLogistics!}'
        gitlab_rails['smtp_enable'] = false
        gitlab_rails['gitlab_email_enabled'] = false
        nginx['listen_port'] = 80

        # ── GitLab Prometheus metrics endpoint ────────────────────────────
        gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0']
        prometheus_monitoring['enable'] = false
    ports:
      - "9080:80"
      - "9022:22"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    shm_size: "256m"
    networks:
      - logistics-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 300s
    restart: unless-stopped
    container_name: logistics-gitlab

  # ════════════════════════════════════════════════════════════════════════════
  # Prometheus — Metrics collection
  # Scrapes: Grafana, Kafka (kafka-exporter), PostgreSQL (postgres-exporter),
  #          Redis (redis-exporter), self
  # ════════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9191:9090"
    networks:
      - logistics-net
    restart: unless-stopped
    container_name: logistics-prometheus

  # ════════════════════════════════════════════════════════════════════════════
  # Grafana — Monitoring dashboards
  # Auth: local admin only (admin / admin)
  # Datasources: Prometheus, PostgreSQL (auto-provisioned)
  # Dashboards: 5 pre-built dashboards (auto-provisioned)
  # ════════════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
      GF_SERVER_ROOT_URL: "http://localhost:9100"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "9100:3000"
    networks:
      - logistics-net
    depends_on:
      - prometheus
      - postgres-shipment
    restart: unless-stopped
    container_name: logistics-grafana
